services:
  db:
    image: postgres:16-alpine
    container_name: abk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-abk_db}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-abk_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abk-api
    restart: unless-stopped
    ports:
      - "${PORT:-6000}:6000"
    environment:
      PORT: 6000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-abk_db}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://abou-khalil-frontend.vercel.app}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-hassan}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-P@ssw0rd}
      SEED_ADMIN_PHONE: ${SEED_ADMIN_PHONE:-0000000000}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - seed
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-abk_db}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-hassan}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-P@ssw0rd}
      SEED_ADMIN_PHONE: ${SEED_ADMIN_PHONE:-0000000000}
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "dist/seed.js"]
    restart: "no"

  seed-user:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - seed-user
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-abk_db}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-hassan}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-P@ssw0rd}
      SEED_ADMIN_PHONE: ${SEED_ADMIN_PHONE:-0000000000}
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "dist/seed-user.js"]
    restart: "no"

volumes:
  postgres_data:
  uploads_data:
